name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  schema-and-safety:
    name: schema + safety gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator deps
        run: pip install pyyaml

      - name: Run validate.py (schema + safety + trust)
        run: ./scripts/validate.py Apps/

      - name: Run check-safety.sh (structured hardening)
        run: ./scripts/check-safety.sh

      - name: Check bundle compatibility with PowerLab core
        run: |
          # Verifies every app survives the bundle-store.sh format conversion
          # (flat title/tagline → i18n map, list port_map → host string, icon file exists).
          # This is the store↔core contract test — catches format regressions before release.
          python3 scripts/check-bundle-compat.py

      - name: yamllint catalog files
        run: |
          pip install yamllint
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable, comments-indentation: disable}}' Apps/ || true

  changie-fragment:
    name: changie fragment required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changie fragment in PR
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" | grep -qE '^\.changes/unreleased/.+\.yaml$'; then
            echo "OK: PR includes a changie fragment"
          else
            echo "FAIL: PR must add a fragment under .changes/unreleased/" >&2
            echo "See CONTRIBUTING.md for the format." >&2
            exit 1
          fi
