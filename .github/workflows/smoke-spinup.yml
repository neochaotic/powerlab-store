name: smoke-spinup

# Tier 3 verification (see CONTRIBUTING / curation-criteria): for each
# app TOUCHED in this PR, actually bring up the compose, wait for the
# container to be healthy or for the port to respond, grep logs for
# error/panic/fatal, then tear down.
#
# Static gates (validate.py, check-safety.sh, icon-lint) cover schema +
# safety + provenance. They DON'T catch "image got deleted upstream",
# "container crashes on start", "endpoint returns 5xx", or "logs full of
# panics". This workflow does.
#
# Scope: PR-only, touched apps only. Nightly sampling and pre-release
# full-matrix are separate workflows (see release.yml + future
# nightly-sample.yml / digest-watch.yml).

on:
  pull_request:
    branches: [main]
    paths:
      - 'Apps/**'

permissions:
  contents: read

jobs:
  detect-touched-apps:
    name: detect touched apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.diff.outputs.apps }}
      has_apps: ${{ steps.diff.outputs.has_apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: diff
        name: Find Apps/<id>/ dirs changed by this PR
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          apps=$(git diff --name-only "$base" "$head" \
            | grep -oE '^Apps/[^/]+' \
            | sort -u \
            | sed 's|^Apps/||' \
            | jq -R . | jq -sc .)
          echo "apps=$apps" >> "$GITHUB_OUTPUT"
          if [[ "$apps" == "[]" ]]; then
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
            echo "No apps touched — smoke-spinup will skip"
          else
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
            echo "Touched apps: $apps"
          fi

  spinup:
    name: spinup ${{ matrix.app }}
    needs: detect-touched-apps
    if: needs.detect-touched-apps.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5           # cap so bulk-import PRs (e.g. Phase 1, 135 apps) don't saturate Actions queue
      matrix:
        app: ${{ fromJson(needs.detect-touched-apps.outputs.apps) }}
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Verify app dir + compose exist
        run: |
          if [[ ! -f "Apps/${{ matrix.app }}/docker-compose.yml" ]]; then
            echo "Apps/${{ matrix.app }}/docker-compose.yml missing — was the app removed?"
            echo "Skipping (removal PR, nothing to spin up)."
            exit 0
          fi

      - name: Skip hardware-only apps
        working-directory: Apps/${{ matrix.app }}
        run: |
          # Auto-skip apps that declare hardware not available in GitHub-hosted runners:
          # AMD ROCm (/dev/kfd), Raspberry Pi VideoCore (/dev/vchiq, /dev/vcsm),
          # and NVIDIA GPU runtime (deploy.resources.reservations.devices with nvidia caps).
          python3 - <<'EOF'
          import sys, yaml
          from pathlib import Path
          d = yaml.safe_load(Path('docker-compose.yml').read_text())
          HARDWARE_DEVICES = {'/dev/kfd', '/dev/vchiq', '/dev/vcsm'}
          for svc in (d.get('services') or {}).values():
              if not isinstance(svc, dict):
                  continue
              for dev in (svc.get('devices') or []):
                  host = dev.split(':')[0] if isinstance(dev, str) else ''
                  if host in HARDWARE_DEVICES:
                      print(f'::notice::Skipping smoke — requires {host} (hardware not in CI)')
                      sys.exit(0)
              deploy = (svc.get('deploy') or {})
              for dr in ((deploy.get('resources') or {}).get('reservations', {}).get('devices') or []):
                  if 'nvidia' in str((dr or {}).get('capabilities', [])):
                      print('::notice::Skipping smoke — requires NVIDIA GPU (not in CI)')
                      sys.exit(0)
          sys.exit(1)  # no hardware found, continue
          EOF
          echo "SKIP=$?" >> "$GITHUB_ENV"
        continue-on-error: true

      - name: Compose config (syntax)
        if: env.SKIP != '0'
        working-directory: Apps/${{ matrix.app }}
        run: |
          # Substitute PowerLab's runtime env vars with safe defaults
          # so compose doesn't bail on unresolved ${POWERLAB_APP_NAME} etc.
          export POWERLAB_APP_NAME="smoke-${{ matrix.app }}"
          export POWERLAB_APP_DATA="/tmp/smoke-data"
          mkdir -p "$POWERLAB_APP_DATA"
          docker compose config --quiet

      - name: Pre-create bind-mount host paths
        if: env.SKIP != '0'
        working-directory: Apps/${{ matrix.app }}
        run: |
          # Create /DATA/... bind-mount paths before compose up so Docker doesn't
          # create them as root (which breaks postgres initdb chmod). Postgres data
          # dirs (mapped to /var/lib/postgresql/data) are chowned to UID 999
          # (the postgres user in official postgres images) so initdb can chmod them.
          python3 - <<'EOF'
          import subprocess, sys, yaml
          from pathlib import Path
          d = yaml.safe_load(Path('docker-compose.yml').read_text())
          for svc in (d.get('services') or {}).values():
              if not isinstance(svc, dict):
                  continue
              for vol in (svc.get('volumes') or []):
                  if isinstance(vol, str):
                      parts = vol.split(':')
                      host_path, container_path = parts[0], parts[1] if len(parts) > 1 else ''
                  elif isinstance(vol, dict) and vol.get('type') == 'bind':
                      host_path = vol.get('source', '')
                      container_path = vol.get('target', '')
                  else:
                      continue
                  if not host_path.startswith('/') or host_path.startswith('/dev'):
                      continue
                  subprocess.run(['sudo', 'mkdir', '-p', host_path], check=True)
                  if 'postgresql' in container_path:
                      subprocess.run(['sudo', 'chown', '999:999', host_path], check=True)
                      subprocess.run(['sudo', 'chmod', '700', host_path], check=True)
                  else:
                      subprocess.run(['sudo', 'chmod', '777', host_path], check=True)
          EOF

      - name: Pull images
        if: env.SKIP != '0'
        working-directory: Apps/${{ matrix.app }}
        run: |
          export POWERLAB_APP_NAME="smoke-${{ matrix.app }}"
          export POWERLAB_APP_DATA="/tmp/smoke-data"
          docker compose pull --quiet

      - name: Bring up
        if: env.SKIP != '0'
        working-directory: Apps/${{ matrix.app }}
        run: |
          export POWERLAB_APP_NAME="smoke-${{ matrix.app }}"
          export POWERLAB_APP_DATA="/tmp/smoke-data"
          docker compose up -d

      - name: Wait for healthy or 60s
        if: env.SKIP != '0'
        working-directory: Apps/${{ matrix.app }}
        run: |
          export POWERLAB_APP_NAME="smoke-${{ matrix.app }}"
          export POWERLAB_APP_DATA="/tmp/smoke-data"
          # If any service defines a healthcheck, wait for it.
          # Otherwise just wait 30s for the process to settle.
          deadline=$(( $(date +%s) + 60 ))
          have_healthcheck=$(docker compose ps --format json | jq -r '.[] | select(.Health) | .Name' | head -1)
          if [[ -n "$have_healthcheck" ]]; then
            echo "Healthcheck present on $have_healthcheck — waiting..."
            while [[ $(date +%s) -lt $deadline ]]; do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$have_healthcheck" 2>/dev/null || echo "unknown")
              if [[ "$status" == "healthy" ]]; then
                echo "Healthy."
                exit 0
              fi
              if [[ "$status" == "unhealthy" ]]; then
                echo "FAIL: container reported unhealthy"
                docker compose logs --tail=50
                exit 1
              fi
              sleep 2
            done
            echo "FAIL: did not become healthy within 60s"
            docker compose logs --tail=50
            exit 1
          else
            echo "No healthcheck defined — sleeping 30s"
            sleep 30
          fi

      - name: Probe declared ports
        if: env.SKIP != '0'
        working-directory: Apps/${{ matrix.app }}
        run: |
          # Extract host ports from x-powerlab.port_map and curl them.
          ports=$(python3 -c "
          import yaml
          d = yaml.safe_load(open('docker-compose.yml'))
          xp = d.get('x-powerlab', {}) or {}
          if xp.get('headless'):
              print('HEADLESS')
              exit(0)
          for pm in xp.get('port_map', []) or []:
              proto = (pm.get('protocol') or 'http').lower()
              if proto in ('http', 'https'):
                  print(f\"{proto}://localhost:{pm['host']}\")
          ")
          if [[ "$ports" == "HEADLESS" ]]; then
            echo "App declared headless — skipping endpoint probe."
            exit 0
          fi
          if [[ -z "$ports" ]]; then
            echo "WARN: no http/https port_map entries to probe"
            exit 0
          fi
          fail=0
          while IFS= read -r url; do
            # Accept 2xx, 3xx, 401, 403 (auth-gated apps are still alive).
            # Fail on 5xx or connection refused.
            code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 "$url" || echo "000")
            echo "$url -> $code"
            case "$code" in
              2*|3*|401|403) ;;
              5*|000)
                echo "  FAIL: $url returned $code"
                fail=1
                ;;
              *)
                echo "  WARN: $url returned $code (accepted but suspicious)"
                ;;
            esac
          done <<< "$ports"
          exit $fail

      - name: Grep logs for fatal patterns
        working-directory: Apps/${{ matrix.app }}
        if: always() && env.SKIP != '0'
        run: |
          export POWERLAB_APP_NAME="smoke-${{ matrix.app }}"
          export POWERLAB_APP_DATA="/tmp/smoke-data"
          logs=$(docker compose logs --tail=200 2>&1 || true)
          echo "=== last 200 log lines ==="
          echo "$logs"
          echo "=========================="
          # Patterns that indicate the app is broken even if it didn't
          # exit. Tolerant of common false positives (e.g. "DEBUG: error
          # handling: ..." in normal startup chatter).
          if echo "$logs" | grep -E '^\[?(FATAL|PANIC)\]?|runtime error|segmentation fault|Cannot connect to' | grep -v 'DEBUG\|TRACE'; then
            echo "FAIL: fatal pattern detected in logs"
            exit 1
          fi
          echo "OK: no fatal patterns"

      - name: Tear down
        if: always() && env.SKIP != '0'
        working-directory: Apps/${{ matrix.app }}
        run: |
          export POWERLAB_APP_NAME="smoke-${{ matrix.app }}"
          export POWERLAB_APP_DATA="/tmp/smoke-data"
          docker compose down -v --remove-orphans || true
