name: nostrudel
services:
  cors:
    image: ghcr.io/hzrd149/docker-cors-anywhere:0.4.5@sha256:641f5ea3265acbc339a03a72b79cd942c4bedab9b1c8b3fc13e5f3f087f649e6
    environment:
      CORSANYWHERE_REQUIRE_HEADERS: host
  web:
    image: ghcr.io/hzrd149/nostrudel:1.1.0@sha256:f07c931e1a1d264fe70e3377796f35828ab7be8b78236b6ed37459ffd1d6661f
    restart: on-failure
    stop_grace_period: 1m
    init: true
    depends_on:
    - cors
    environment:
      REQUEST_PROXY: cors:8080
version: '3.7'
x-powerlab:
  store_app_id: nostrudel
  title: noStrudel
  tagline: A sandbox for exploring nostr
  category: Productivity
  port_map:
  - container: 80
    host: 80
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: nostrudel
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: nostrudel/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: noStrudel (logo trademark; sourced via Umbrel app gallery)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: hzrd149
  developer: hzrd149
  main: cors
