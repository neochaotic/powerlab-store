name: snapdrop
services:
  snapdrop:
    environment:
    - PGID=$PGID
    - PUID=$PUID
    - TZ=$TZ
    image: linuxserver/snapdrop:version-eac78009
    network_mode: bridge
    ports:
    - target: 443
      published: '443'
      protocol: tcp
    - target: 80
      published: '89'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/snapdrop/config
      target: /config
    privileged: false
version: '3.7'
x-powerlab:
  store_app_id: snapdrop
  title: Snapdrop
  tagline: Snapdrop
  category: System
  port_map:
  - container: 443
    host: 443
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Snapdrop
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Snapdrop/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Snapdrop (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Snapdrop
  developer: Snapdrop
  main: snapdrop
