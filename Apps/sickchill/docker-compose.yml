name: sickchill
services:
  sickchill:
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: Europe/London
    image: linuxserver/sickchill:2023.6.27@sha256:fb4f709823e3971b5c965dbdebb45fc77d409bc04be7c1e30e4af5cfb1a573d2
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 8081
      published: '8081'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/sickchill/config
      target: /config
    - type: bind
      source: /DATA/PowerLabAppData/sickchill/data
      target: /downloads
    - type: bind
      source: /DATA/PowerLabAppData/sickchill/TV Shows
      target: /tv
version: '3.7'
x-powerlab:
  store_app_id: sickchill
  title: Sickchill
  tagline: Automatic video library manager for TV Shows
  category: Media
  port_map:
  - container: 8081
    host: 8081
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Sickchill
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Sickchill/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Sickchill (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Sickchill Team
  developer: Sickchill Team
  main: sickchill
