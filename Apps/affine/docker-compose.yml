  store_app_id: affine
  title: Affine
  tagline: Open source alternative to Notion, Miro, and Airtable
  category: Files & Sync
  port_map:
  - container: 3010
    host: 3010
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: affine
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: affine/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: Affine (logo trademark; sourced via Umbrel app gallery)
  security:
