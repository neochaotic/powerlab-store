name: albyhub
services:
  albyhub:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      UMASK: '002'
      WORK_DIR: /data/albyhub
      LOG_EVENTS: true
    command: []
    image: ghcr.io/getalby/hub:v1.20.0
    deploy:
      resources:
        reservations:
          memory: 1024M
    labels:
      icon: https://cdn.jsdelivr.net/gh/getAlby/umbrel-community-app-store@master/alby-albyhub/images/icon.svg
    ports:
    - target: 8080
      published: '58000'
      protocol: tcp
    restart: on-failure
    stop_grace_period: 1m
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/albyhub/data
      target: /data
    network_mode: bridge
    privileged: false
version: '3.7'
x-powerlab:
  store_app_id: albyhub
  title: AlbyHub
  tagline: AlbyHub
  category: System
  port_map:
  - container: 58000
    host: 58000
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: AlbyHub
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/AlbyHub/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: CC-BY-SA-4.0
    attribution: AlbyHub (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: AlbyHub
  developer: AlbyHub
  main: albyhub
