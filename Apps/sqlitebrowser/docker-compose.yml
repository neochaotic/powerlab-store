name: sqlitebrowser
services:
  app:
    image: linuxserver/sqlitebrowser:3.13.1@sha256:1b1e81f0af222af3353a4c8d3c4737264a1816a43e4410819430335fa099b1da
    restart: on-failure
    volumes:
    - /DATA/PowerLabAppData/sqlitebrowser/data/config:/config
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Etc/CET
version: '3.7'
x-powerlab:
  store_app_id: sqlitebrowser
  title: SQLite Browser
  tagline: A database browser for SQLite
  category: Developer
  port_map:
  - container: 3000
    host: 3000
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: sqlitebrowser
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: sqlitebrowser/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: SQLite Browser (logo trademark; sourced via Umbrel app gallery)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: SQLiteBrowser
  developer: SQLiteBrowser
  main: app
