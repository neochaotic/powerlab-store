name: sabnzbd
services:
  sabnzbd:
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: Europe/London
    image: linuxserver/sabnzbd:4.1.0
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 8080
      published: '8282'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/sabnzbd/data
      target: /incomplete-downloads
    - type: bind
      source: /DATA/PowerLabAppData/sabnzbd/config
      target: /config
    - type: bind
      source: /DATA/PowerLabAppData/sabnzbd/data
      target: /downloads
version: '3.7'
x-powerlab:
  store_app_id: sabnzbd
  title: Sabnzbd
  tagline: Free and easy binary newsreader
  category: Media
  port_map:
  - container: 8282
    host: 8282
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Sabnzbd
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Sabnzbd/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Sabnzbd (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Sabnzbd Team
  developer: Sabnzbd Team
  main: sabnzbd
