name: mongo
services:
  mongo:
    image: mongo:8.2.2
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    ports:
    - target: 27017
      published: 27017
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/mongo/data/configdb
      target: /data/configdb
    - type: bind
      source: /DATA/PowerLabAppData/mongo/data/db
      target: /data/db
version: '3.7'
x-powerlab:
  store_app_id: mongo
  title: Mongo
  tagline: Mongo
  category: System
  port_map:
  - container: 27017
    host: 27017
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Mongo
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Mongo/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Mongo (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Mongo
  developer: Mongo
  main: mongo
