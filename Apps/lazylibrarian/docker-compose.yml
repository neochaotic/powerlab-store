name: lazylibrarian
services:
  lazylibrarian:
    environment:
      DOCKER_MODS: linuxserver/calibre-web:calibre|linuxserver/mods:lazylibrarian-ffmpeg
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: linuxserver/lazylibrarian:version-169e669f@sha256:9f0161cc4e198a4a17407fd5bfdc166300038a1bceb4c735e99ab7380dfdb899
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 5299
      published: '5299'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/lazylibrarian/data
      target: /downloads
    - type: bind
      source: /DATA/PowerLabAppData/lazylibrarian/Books
      target: /books
    - type: bind
      source: /DATA/PowerLabAppData/lazylibrarian/config
      target: /config
version: '3.7'
x-powerlab:
  store_app_id: lazylibrarian
  title: Lazylibrarian
  tagline: eBook Auto Downloader
  category: Media
  port_map:
  - container: 5299
    host: 5299
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Lazylibrarian
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Lazylibrarian/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Lazylibrarian (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Lazylibrarian Team
  developer: Lazylibrarian Team
  main: lazylibrarian
