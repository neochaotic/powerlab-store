name: mongodb4
services:
  mongodb4:
    image: mongo:4.4.22@sha256:dcef38a5b82ca7e1293055ededc22d38fb27fffb526523c70a4cbd864182c310
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    ports:
    - target: 27017
      published: '27017'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/mongodb4/data/configdb
      target: /data/configdb
    - type: bind
      source: /DATA/PowerLabAppData/mongodb4/data/db
      target: /data/db
version: '3.7'
x-powerlab:
  store_app_id: mongodb4
  title: MongoDB4
  tagline: MongoDB4
  category: System
  port_map:
  - container: 27017
    host: 27017
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: MongoDB4
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/MongoDB4/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: MongoDB4 (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: MongoDB4
  developer: MongoDB4
  main: mongodb4
