name: photoprism
services:
  photoprism:
    environment:
      PHOTOPRISM_ADMIN_PASSWORD: casaos
      PHOTOPRISM_UPLOAD_NSFW: 'true'
      TZ: $TZ
    image: photoprism/photoprism:250228
    deploy:
      resources:
        reservations:
          memory: 512M
    network_mode: bridge
    ports:
    - target: 2342
      published: '2342'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/photoprism/photoprism/storage
      target: /photoprism/storage
    - type: bind
      source: /DATA/PowerLabAppData/photoprism/data
      target: /photoprism/originals
version: '3.7'
x-powerlab:
  store_app_id: photoprism
  title: PhotoPrism
  tagline: Browsing, organizing & sharing your photo collection
  category: Media
  port_map:
  - container: 2342
    host: 2342
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: PhotoPrism
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/PhotoPrism/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: PhotoPrism (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: PhotoPrism
  developer: PhotoPrism
  main: photoprism
