name: poznote
services:
  app:
    image: ghcr.io/timothepoznanski/poznote:6.10.0@sha256:0767aa6e1d40b551795a5798f8ea922694db4118628a2537f2a64943c19037f2
    restart: on-failure
    environment:
      SQLITE_DATABASE: /var/www/html/data/database/poznote.db
      HTTP_WEB_PORT: 80
    volumes:
    - /DATA/PowerLabAppData/poznote/data:/var/www/html/data
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --timeout=5
      - -O
      - /dev/null
      - http://127.0.0.1/api/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  mcp:
    image: ghcr.io/timothepoznanski/poznote-mcp:6.10.0@sha256:8ee0b5cb86c2481cdda404e4159d934b4fe466270a33e7fb966d48d7559f918f
    restart: on-failure
    environment:
      POZNOTE_API_URL: http://app:80/api/v1
      POZNOTE_DEBUG: ${POZNOTE_DEBUG:-false}
    ports:
    - 8340:8045
    volumes:
    - /DATA/PowerLabAppData/poznote/data:/var/www/html/data:ro
    depends_on:
    - app
version: '3.7'
x-powerlab:
  store_app_id: poznote
  title: Poznote
  tagline: A powerful app for taking notes
  category: Files & Sync
  port_map:
  - container: 80
    host: 9300
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: poznote
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: poznote/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: Poznote (logo trademark; sourced via Umbrel app gallery)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Timothé Poznanski
  developer: Timothé Poznanski
  main: mcp
