name: emby
services:
  emby:
    devices:
    - /dev/dri:/dev/dri
    - /dev/vchiq:/dev/vchiq
    - /dev/video10:/dev/video10
    - /dev/video11:/dev/video11
    - /dev/video12:/dev/video12
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: $TZ
    image: linuxserver/emby:4.9.1@sha256:873fe21193c902b1919a75584ad6ee99e2286cd7194fd0c8c70d13113574b78b
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 8096
      published: '8096'
      protocol: tcp
    - target: 8920
      published: '8920'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/emby/config
      target: /config
    - type: bind
      source: /DATA/PowerLabAppData/emby/TV Shows
      target: /data/tvshows
    - type: bind
      source: /DATA/PowerLabAppData/emby/Movies
      target: /data/movies
version: '3.7'
x-powerlab:
  store_app_id: emby
  title: Emby
  tagline: TAKE YOUR MEDIA ANYWHERE WITH EMBY
  category: Media
  port_map:
  - container: 8096
    host: 8096
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Emby
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Emby/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Emby (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: linuxserver
  developer: linuxserver
  main: emby
