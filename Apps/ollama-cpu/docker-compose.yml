name: ollama-cpu
services:
  ollama:
    image: ollama/ollama:0.9.5@sha256:64fcc2a7c48ae920f5317264031d86414e30417269631822858c6d23f61100b0
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_CONTEXT_LENGTH: '4096'
    ports:
    - target: 11434
      published: '11434'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/ollama-cpu/models
      target: /root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    healthcheck:
      test:
      - CMD-SHELL
      - ollama --version >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
version: '3.7'
x-powerlab:
  store_app_id: ollama-cpu
  title: Ollama (CPU)
  tagline: Run large language models locally — CPU, works on any host
  category: AI & ML
  port_map:
  - container: 11434
    host: 11434
    protocol: http
  source:
    catalog: powerlab-authored
    upstream_id: ollama
    upstream_repo: https://github.com/ollama/ollama
    upstream_path: hand-authored
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T00:00:00Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Ollama (CPU)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Ollama
  developer: Ollama
  main: ollama
