name: downtify
services:
  downtify:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: ghcr.io/henriquesebastiao/downtify:2.6.0@sha256:7a71e6b510b28a5f34dec033ca52a3a7b0713cb44924d77101961a4c2697aabb
    deploy:
      resources:
        reservations:
          memory: 2048M
    ports:
    - target: 8000
      published: '8582'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/downtify/downtify
      target: /downloads
    - type: bind
      source: /DATA/PowerLabAppData/downtify/data
      target: /data
version: '3.7'
x-powerlab:
  store_app_id: downtify
  title: Downtify
  tagline: Downtify
  category: System
  port_map:
  - container: 8582
    host: 8582
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Downtify
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Downtify/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Downtify (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Downtify
  developer: Downtify
  main: downtify
