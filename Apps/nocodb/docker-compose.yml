name: nocodb
services:
  app:
    image: nocodb/nocodb:2026.04.5@sha256:4498ea3612227f43842468033e27661ff3db4775a5cbc40399695198329ee2b2
    restart: on-failure
    user: 1000:1000
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_DB: pg://postgres:5432?u=nocodb&p=itworkslocally&d=nocodb
    volumes:
    - /DATA/PowerLabAppData/nocodb/data/app:/usr/app/data
  postgres:
    image: postgres:18.3-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: nocodb
      POSTGRES_USER: nocodb
      POSTGRES_PASSWORD: itworkslocally
      PGDATA: /data/pgdata
    healthcheck:
      test: pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
    - /DATA/PowerLabAppData/nocodb/data/db:/data
version: '3.7'
x-powerlab:
  store_app_id: nocodb
  title: NocoDB
  tagline: No-code platform for database management, self-hosted Airtable alternative
  category: Files & Sync
  port_map:
  - container: 8080
    host: 8080
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: nocodb
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: nocodb/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: NocoDB (logo trademark; sourced via Umbrel app gallery)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: NocoDB Inc.
  developer: NocoDB Inc.
  main: app
