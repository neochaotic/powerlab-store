name: syncthing
services:
  syncthing:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: linuxserver/syncthing:1.29.7
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
    - target: 8384
      published: '8384'
      protocol: tcp
    - target: 22000
      published: '22000'
      protocol: tcp
    - target: 22000
      published: '22000'
      protocol: udp
    - target: 21027
      published: '21027'
      protocol: udp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/syncthing/config
      target: /config
    - type: bind
      source: /DATA/PowerLabAppData/syncthing/DATA
      target: /DATA
version: '3.7'
x-powerlab:
  store_app_id: syncthing
  title: Syncthing
  tagline: Free, secure, and distributed file synchronisation tool.
  category: Files & Sync
  port_map:
  - container: 8384
    host: 8384
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Syncthing
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Syncthing/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Syncthing (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Syncthing
  developer: Syncthing
  main: syncthing
