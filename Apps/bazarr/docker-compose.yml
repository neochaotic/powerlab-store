name: bazarr
services:
  bazarr:
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: Europe/London
    image: linuxserver/bazarr:1.5.6
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 6767
      published: '6767'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/bazarr/Movies
      target: /movies
    - type: bind
      source: /DATA/PowerLabAppData/bazarr/TV Shows
      target: /tv
    - type: bind
      source: /DATA/PowerLabAppData/bazarr/config
      target: /config
version: '3.7'
x-powerlab:
  store_app_id: bazarr
  title: Bazarr
  tagline: Letter generators for Sonarr and Radarr
  category: Media
  port_map:
  - container: 6767
    host: 6767
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Bazarr
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Bazarr/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Bazarr (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Sabnzbd Team
  developer: Sabnzbd Team
  main: bazarr
