name: smokeping
services:
  smokeping:
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: Europe/London
    image: linuxserver/smokeping:2.8.2@sha256:b7f906899cd3e24f2a867013b3cd1ae4e3817a65740080717290a259d097ad0c
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 80
      published: '10280'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/smokeping/config
      target: /config
    - type: bind
      source: /DATA/PowerLabAppData/smokeping/data
      target: /data
version: '3.7'
x-powerlab:
  store_app_id: smokeping
  title: Smokeping
  tagline: Free open source network performance monitoring tool
  category: Network & VPN
  port_map:
  - container: 10280
    host: 10280
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Smokeping
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Smokeping/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Smokeping (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Lazylibrarian Team
  developer: Lazylibrarian Team
  main: smokeping
