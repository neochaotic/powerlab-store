name: postgresql
services:
  postgresql:
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      POSTGRES_USER: casaos
      POSTGRES_PASSWORD: casaos
      POSTGRES_DB: casaos
    image: postgres:17.4@sha256:304ab813518754228f9f792f79d6da36359b82d8ecf418096c636725f8c930ad
    deploy:
      resources:
        reservations:
          memory: 2048M
    restart: unless-stopped
    ports:
    - target: 5432
      published: '5432'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/postgresql/data
      target: /var/lib/postgresql/data
version: '3.7'
x-powerlab:
  store_app_id: postgresql
  title: PostgreSQL
  tagline: PostgreSQL
  category: System
  port_map:
  - container: 5432
    host: 5432
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: PostgreSQL
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/PostgreSQL/docker-compose.yml
    transform_version: 1.0-powerlab-secure
