    host: 80
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: hortusfox
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: hortusfox/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: HortusFox (logo trademark; sourced via Umbrel app gallery)
  security:
