name: duplicati
services:
  duplicati:
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: Europe/London
    image: linuxserver/duplicati:2.1.0@sha256:ea0fc5050e0369e3d6736ac4633c65a977668889aed949aaa312ba4c73c8c772
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 8200
      published: '8200'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/duplicati/config
      target: /config
    - type: bind
      source: /DATA/PowerLabAppData/duplicati/backups
      target: /backups
    - type: bind
      source: /DATA/PowerLabAppData/duplicati/source
      target: /source
version: '3.7'
x-powerlab:
  store_app_id: duplicati
  title: Duplicati
  tagline: Store securely encrypted backups in the cloud!
  category: Files & Sync
  port_map:
  - container: 8200
    host: 8200
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Duplicati
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Duplicati/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Duplicati (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: duplicati
  developer: duplicati
  main: duplicati
