    upstream_path: Apps/Jellyfin_Nvidia/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: CC-BY-SA-4.0
    attribution: Jellyfin_Nvidia (logo trademark; sourced via CasaOS AppStore)
  security:
