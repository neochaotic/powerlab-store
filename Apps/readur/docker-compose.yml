name: readur
services:
  app:
    image: ghcr.io/readur/readur:2.9.1@sha256:16aa8b1d7df218ab0f4fc57fbf890d125020fca416bc3555aa7731e7329020dc
    user: 1000:1000
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://readur:readur_password@readur_postgres_1:5432/readur
      JWT_SECRET: ''
      SERVER_ADDRESS: 0.0.0.0:8000
      UPLOAD_PATH: /app/uploads
      WATCH_FOLDER: /app/watch
      ALLOWED_FILE_TYPES: pdf,png,jpg,jpeg,tiff,bmp,gif,txt,rtf,doc,docx
      WATCH_INTERVAL_SECONDS: 30
      FILE_STABILITY_CHECK_MS: 500
      MAX_FILE_AGE_HOURS: 168
      OCR_LANGUAGE: eng
      CONCURRENT_OCR_JOBS: 4
      OCR_TIMEOUT_SECONDS: 300
      MAX_FILE_SIZE_MB: 50
      MEMORY_LIMIT_MB: 512
      CPU_PRIORITY: normal
      ADMIN_PASSWORD: readur2024
    volumes:
    - /DATA/PowerLabAppData/readur/data/uploads:/app/uploads
    - /DATA/PowerLabAppData/readur/data/watch:/app/watch
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/api/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:17.5@sha256:3962158596daaef3682838cc8eb0e719ad1ce520f88e34596ce8d5de1b6330a1
    user: 1000:1000
    restart: on-failure
    environment:
      POSTGRES_USER: readur
      POSTGRES_PASSWORD: readur_password
      POSTGRES_DB: readur
    volumes:
    - /DATA/PowerLabAppData/readur/data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U readur
      interval: 10s
      timeout: 5s
      retries: 5
version: '3.7'
x-powerlab:
  store_app_id: readur
  title: Readur
  tagline: An intuitive OCR platform for documents
  category: Files & Sync
  port_map:
  - container: 8000
    host: 8000
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: readur
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: readur/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: Readur (logo trademark; sourced via Umbrel app gallery)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Jon Fuller
  developer: Jon Fuller
  main: app
