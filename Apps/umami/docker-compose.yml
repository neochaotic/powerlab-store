name: umami
services:
  app:
    image: ghcr.io/umami-software/umami:3.1.0@sha256:e3f80c0625aad7179b49da27d475357cabb1068b8cacd9a792cfd6966888b123
    user: 1001:1001
    restart: on-failure
    stop_grace_period: 1m
    ports:
    - 25727:3000
    environment:
      DATABASE_URL: postgresql://umami:umami@db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ''
    depends_on:
    - db
  db:
    image: postgres:15-alpine@sha256:8a8d55343d6fc456cb183453e3094ff140b984157b36b48f817dd581654f2aec
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    volumes:
    - /DATA/PowerLabAppData/umami/data/db:/var/lib/postgresql/data
version: '3.7'
x-powerlab:
  store_app_id: umami
  title: Umami
  tagline: Simple, fast, privacy-focused alternative to Google Analytics
  category: Developer
  port_map:
  - container: 25727
    host: 25727
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: umami
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: umami/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: Umami (logo trademark; sourced via Umbrel app gallery)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Umami
  developer: Umami
  main: app
