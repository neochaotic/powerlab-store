name: flaresolverr
services:
  flaresolverr:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      UMASK: '002'
      LOG_LEVEL: info
      LOG_HTML: 'false'
      CAPTCHA_SOLVER: none
    cpu_shares: 50
    command: []
    deploy:
      resources:
        reservations:
          memory: 64M
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.5@sha256:4f4e5f759aa3a9a64305e99188ea1db1ec2944a5e7d290d2b089af5f2f6f48e4
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlareSolverr/icon.png
    ports:
    - target: 8191
      published: '8191'
      protocol: tcp
    restart: unless-stopped
    network_mode: bridge
    privileged: false
