name: qbittorrent
services:
  qbittorrent:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      UMASK: '002'
    image: ghcr.io/hotio/qbittorrent:release-5.0.4
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
    - target: 8080
      published: '8181'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/qbittorrent/config
      target: /config
    - type: bind
      source: /DATA/PowerLabAppData/qbittorrent/DATA
      target: /DATA
version: '3.7'
x-powerlab:
  store_app_id: qbittorrent
  title: qBittorrent
  tagline: Free BitTorrent downloader
  category: Media
  port_map:
  - container: 8181
    host: 8181
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: qBittorrent
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/qBittorrent/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: qBittorrent (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: qBittorrent
  developer: qBittorrent
  main: qbittorrent
