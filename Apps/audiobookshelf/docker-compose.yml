name: audiobookshelf
services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.30.0
    deploy:
      resources:
        reservations:
          memory: 64M
    restart: unless-stopped
    volumes:
    - /DATA/PowerLabAppData/audiobookshelf/Audiobooks:/audiobooks
    - /DATA/PowerLabAppData/audiobookshelf/Podcasts:/podcasts
    - /DATA/PowerLabAppData/audiobookshelf/config:/config
    - /DATA/PowerLabAppData/audiobookshelf/metadata:/metadata
    ports:
    - 13378:80
version: '3.7'
x-powerlab:
  store_app_id: audiobookshelf
  title: Audiobookshelf
  tagline: Audiobookshelf
  category: System
  port_map:
  - container: 13378
    host: 13378
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Audiobookshelf
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Audiobookshelf/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Audiobookshelf (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Audiobookshelf
  developer: Audiobookshelf
  main: audiobookshelf
