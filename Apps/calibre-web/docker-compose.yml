name: calibre-web
services:
  calibre-web:
    environment:
      DOCKER_MODS: ghcr.io/linuxserver/mods:universal-calibre
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: linuxserver/calibre-web:0.6.24
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 8083
      published: '8083'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/PowerLabAppData/calibre-web/config
      target: /config
    - type: bind
      source: /DATA/PowerLabAppData/calibre-web/Books
      target: /books
version: '3.7'
x-powerlab:
  store_app_id: calibre-web
  title: Calibre-web
  tagline: Web app for browsing, reading and downloading eBooks stored in a Calibre database
  category: Media
  port_map:
  - container: 8083
    host: 8083
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Calibre-web
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Calibre-web/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Calibre-web (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: linuxserver
  developer: linuxserver
  main: calibre-web
