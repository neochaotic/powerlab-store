    upstream_path: zeronote/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: ZeroNote (logo trademark; sourced via Umbrel app gallery)
  security:
