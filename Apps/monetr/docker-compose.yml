name: monetr
services:
  db:
    image: postgres:17.9@sha256:7ad98329d513dd497293b951c195ca354274a77f12ddbbbbf85e68a811823d72
    user: 1000:1000
    environment:
      POSTGRES_PASSWORD: m0netrPass123
      POSTGRES_USER: postgres
      POSTGRES_DB: monetr
    volumes:
    - /DATA/PowerLabAppData/monetr/data/db:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
  valkey:
    image: valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    user: 1000:1000
    volumes:
    - /DATA/PowerLabAppData/monetr/data/valkey:/data
    healthcheck:
      test:
      - CMD
      - valkey-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 10
  monetr:
    image: ghcr.io/monetr/monetr:1.14.0@sha256:554dfee11adab524f71d70358f70fe88ec8bb23e57f0afdb92cec352305f7246
    user: 1000:1000
    command:
    - serve
    - --migrate
    - --generate-certificates
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
    - /DATA/PowerLabAppData/monetr/data/app:/etc/monetr
    environment:
      MONETR_ALLOW_SIGN_UP: ${MONETR_ALLOW_SIGN_UP:-true}
      MONETR_PG_USERNAME: postgres
      MONETR_PG_PASSWORD: m0netrPass123
      MONETR_PG_DATABASE: monetr
      MONETR_PG_ADDRESS: db
      MONETR_PG_PORT: 5432
      MONETR_REDIS_ENABLED: 'true'
      MONETR_REDIS_ADDRESS: valkey
      MONETR_REDIS_PORT: 6379
      MONETR_STORAGE_ENABLED: ${MONETR_STORAGE_ENABLED:-true}
      MONETR_STORAGE_PROVIDER: ${MONETR_STORAGE_PROVIDER:-filesystem}
version: '3.7'
x-powerlab:
  store_app_id: monetr
  title: Monetr
  tagline: A budgeting application focused on planning for recurring expenses
  category: Finance
  port_map:
  - container: 4000
    host: 4000
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: monetr
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: monetr/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: Monetr (logo trademark; sourced via Umbrel app gallery)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Monetr LLC.
  developer: Monetr LLC.
  main: monetr
