name: campfire
services:
  server:
    image: ghcr.io/basecamp/once-campfire:1.4.3@sha256:21a419dd93b10b3598a25634e5eed2305bec1c75347b260ed1665dbc70864dd8
    user: 1000:1000
    volumes:
    - /DATA/PowerLabAppData/campfire/data/app:/rails/storage
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ''
      REDIS_URL: redis://campfire_redis_1:6379
      DISABLE_SSL: 'true'
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
    - redis
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 2G
          cpus: '1'
    restart: on-failure
  redis:
    image: redis:7-alpine@sha256:ee64a64eaab618d88051c3ade8f6352d11531fcf79d9a4818b9b183d8c1d18ba
    user: 1000:1000
    command: redis-server --save 60 1 --save 300 10 --save 900 100 --appendonly yes --loglevel warning
    volumes:
    - /DATA/PowerLabAppData/campfire/data/redis:/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: on-failure
version: '3.7'
x-powerlab:
  store_app_id: campfire
  title: Campfire
  tagline: Self-hosted chat for teams
  category: Productivity
  port_map:
  - container: 80
    host: 80
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: campfire
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: campfire/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: Campfire (logo trademark; sourced via Umbrel app gallery)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: basecamp
  developer: basecamp
  main: server
