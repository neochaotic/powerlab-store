name: crafty
services:
  crafty:
    image: registry.gitlab.com/crafty-controller/crafty-4:4.4.11
    restart: always
    environment:
    - TZ=Etc/UTC
    ports:
    - 8111:8443
    - 8112:8123
    - 19132:19132/udp
    - 25500-25600:25500-25600
    volumes:
    - /DATA/PowerLabAppData/crafty/backups:/crafty/backups
    - /DATA/PowerLabAppData/crafty/logs:/crafty/logs
    - /DATA/PowerLabAppData/crafty/servers:/crafty/servers
    - /DATA/PowerLabAppData/crafty/config:/crafty/app/config
    - /DATA/PowerLabAppData/crafty/import:/crafty/import
version: '3.7'
x-powerlab:
  store_app_id: crafty
  title: Crafty
  tagline: Take control of your Minecraft servers.
  category: Productivity
  port_map:
  - container: 8111
    host: 8111
    protocol: http
  source:
    catalog: casaos-appstore
    upstream_id: Crafty
    upstream_repo: https://github.com/IceWhaleTech/CasaOS-AppStore.git
    upstream_path: Apps/Crafty/docker-compose.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.png
    license: nominative-fair-use
    attribution: Crafty (logo trademark; sourced via CasaOS AppStore)
  security:
    image_pin: REQUIRES-DIGEST-PIN
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: Crafty Team
  developer: Crafty Team
  main: crafty
