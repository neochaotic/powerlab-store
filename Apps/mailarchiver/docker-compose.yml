name: mailarchiver
services:
  app:
    image: ghcr.io/s1t5/mailarchiver:2604.2@sha256:53800df180b876e3cc02e31f088e0684bf81a4380ad22b5419da99e8559bb5ba
    restart: on-failure
    volumes:
    - /DATA/PowerLabAppData/mailarchiver/data/data-protection-keys:/app/DataProtection-Keys
    - /DATA/PowerLabAppData/mailarchiver/data/appsettings.json:/app/appsettings.json
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:18.3-alpine3.23@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: on-failure
    user: 1000:1000
    environment:
      POSTGRES_DB: mailarchiver
      POSTGRES_USER: mailarchiver
      POSTGRES_PASSWORD: mailarchiver
    volumes:
    - /DATA/PowerLabAppData/mailarchiver/data/database:/var/lib/postgresql
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U mailarchiver -d mailarchiver
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
version: '3.7'
x-powerlab:
  store_app_id: mailarchiver
  title: Mail Archiver
  tagline: A comprehensive solution for archiving, searching, and exporting emails
  category: Files & Sync
  port_map:
  - container: 5000
    host: 5000
    protocol: http
  source:
    catalog: umbrel-apps
    upstream_id: mailarchiver
    upstream_repo: https://github.com/getumbrel/umbrel-apps.git
    upstream_path: mailarchiver/umbrel-app.yml
    transform_version: 1.0-powerlab-secure
    synced_at: '2026-05-19T02:27:01Z'
  icon:
    file: icon.svg
    license: nominative-fair-use
    attribution: Mail Archiver (logo trademark; sourced via Umbrel app gallery)
  security:
    image_pin: pinned
    audit_notes: Reviewed during import from upstream catalog (see x-powerlab.source). No init scripts, no privilege escalation,
      no host-namespace bypass, no kernel capability grants. Volume paths rewritten to /DATA/PowerLabAppData/<id>.
  author: s1t5
  developer: s1t5
  main: app
